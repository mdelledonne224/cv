<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Marcelo Delledonne — Portfolio</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="icon" href="./favicon.ico" type="image/x-icon">
  </head>
  <body class="Terminal__body">
    <div class="container">
      <div class="Terminal">
        <div class="Terminal__Toolbar">
          <div class="Toolbar__buttons">
            <button class="Toolbar__button Toolbar__button--exit" aria-label="close">&#10005;</button>
            <button class="Toolbar__button" aria-label="minimize">&#9472;</button>
            <button class="Toolbar__button" aria-label="maximize">&#9723;</button>
          </div>
          <p class="Toolbar__user">mdelledonne@portfolio:~</p>
        </div>
        <div class="Terminal__body" id="term">
          <div class="Terminal__output" id="output">
            <div class="Terminal__text">Portfolio — Marcelo Ignacio Delledonne</div>
            <div class="Terminal__text dim">Escribí <span class="hl">help</span> para ver los comandos disponibles. <span class="dim2">(type 'lang en' for English)</span></div>
          </div>
          <div class="Terminal__Prompt" id="prompt-line">
            <span class="Prompt__user">mdelledonne@portfolio</span><span class="Prompt__colon">:</span><span class="Prompt__location">~</span><span class="Prompt__dollar">$</span>
            <span class="Prompt__input" id="input"></span><span class="Prompt__cursor"></span>
          </div>
        </div>
      </div>
    </div>
    <script src="./js/terminal.js" defer></script>
  </body>
</html>
